<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>e-form</title>
</head>
<body>
    <fieldset style="font-family: sans-serif; color: green;">
        <legend style="font-weight: bold;">PRODUCT</legend>
        NAME: <input type="text" placeholder="name of product"><br> <br>
        PRODUCT CATEGORY: <input type="text" placeholder="category of product"><br> <br>
        PRODUCT PRICE: <input type="number" placeholder="price"><br><br>
        PRODUCT TYPE:  <input type="type" placeholder="type"><br><br>
        PRODUCT IMAGE: <input type="file"><br><br>
        PRODUCT SPECIFICATION: <input type="specification" placeholder="specification"><br><br>
        PHONE NUMBER: <input type="phone number" placeholder="phone number"><br><br>
        DELIVERY ADDRESS: <input type="home address" placeholder="home address"><br><br>

        <button style="color: white;background-color: green;">submit</button>

    </fieldset>
</body>
</html>
